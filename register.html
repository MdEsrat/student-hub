<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login - UniConnect</title>
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet" />
  <script>
    function toggleMenu() {
      const menu = document.getElementById("mobile-menu");
      menu.classList.toggle("hidden");
    }
  </script>
</head>
<body class="bg-gray-100 font-sans">
  <!-- Navbar -->
  <header class="bg-blue-700 text-white shadow">
    <div class="max-w-7xl mx-auto px-4 py-4 flex justify-between items-center">
      <h1 class="text-2xl font-bold">UniConnect</h1>
      <div class="md:hidden">
        <button onclick="toggleMenu()" class="text-white focus:outline-none">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
          </svg>
        </button>
      </div>
      <nav class="hidden md:flex gap-6">
        <a href="/index.html" class="hover:text-yellow-300">Home</a>
        <a href="/dashboard.html" class="hover:text-yellow-300">Dashboard</a>
        <a href="/profile.html" class="hover:text-yellow-300">Profile</a>
        <a href="/login.html" class="hover:text-yellow-300">Login</a>
        <a href="/register.html" class="hover:text-yellow-300">Register</a>
      </nav>
    </div>
    <div id="mobile-menu" class="md:hidden hidden px-4 pb-4">
      <a href="/index.html" class="block py-2">Home</a>
      <a href="/dashboard.html" class="block py-2">Dashboard</a>
      <a href="/profile.html" class="block py-2">Profile</a>
      <a href="/login.html" class="block py-2">Login</a>
      <a href="/register.html" class="block py-2">Register</a>
    </div>
  </header>

  <!-- Login Form -->
  <!-- Identical header/footer to login.html -->
<!-- Main content -->
<main class="flex items-center justify-center min-h-screen px-4">
  <form action="/api/register" method="POST" class="bg-white p-8 rounded shadow-md w-full max-w-md">
    <h2 class="text-2xl font-bold mb-6 text-center">Register</h2>
    <label class="block mb-4">
      <span class="text-gray-700">Full Name</span>
      <input type="text" name="name" required class="w-full border border-gray-300 rounded px-3 py-2" />
    </label>
    <label class="block mb-4">
      <span class="text-gray-700">University Email</span>
      <input type="email" name="email" required pattern="^[a-zA-Z0-9._%+-]+@university\\.edu$" class="w-full border border-gray-300 rounded px-3 py-2" />
    </label>
    <label class="block mb-4">
      <span class="text-gray-700">Phone</span>
      <input type="tel" name="phone" required pattern="^[0-9]{10}$" class="w-full border border-gray-300 rounded px-3 py-2" />
    </label>
    <label class="block mb-4">
      <span class="text-gray-700">Password</span>
      <input type="password" name="password" required pattern=".{6,}" class="w-full border border-gray-300 rounded px-3 py-2" />
    </label>
    <button type="submit" class="bg-blue-600 text-white py-2 px-4 rounded hover:bg-blue-800 w-full">Register</button>
    <p class="mt-4 text-sm text-center">Already have an account? <a href="/login.html" class="text-blue-600 underline">Login here</a>.</p>
  </form>
</main>


  <!-- Footer -->
  <footer class="text-center text-sm text-gray-600 py-6 bg-gray-200">
    &copy; 2025 UniConnect. All rights reserved.
  </footer>
</body>
</html>
